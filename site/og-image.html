<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Sidekick Preview</title><style>
:root { color-scheme: light; --ink:#102018; --paper:#f6f0e4; --line:#cdbf9f; --accent:#1f7a4d; --deep:#0c2f24; }
* { box-sizing: border-box; }
body { margin:0; font-family: Georgia, 'Times New Roman', serif; background: radial-gradient(circle at top left,#fff8df,#f4ead3 45%,#e5d8ba); color:var(--ink); }
main, .wrap { max-width: 1080px; margin: 0 auto; padding: 48px 24px; }
a { color: var(--accent); }
.hero { padding: 72px 24px; border-bottom: 1px solid var(--line); background: linear-gradient(135deg,#163b2e,#1f7a4d); color:#fff8df; }
.hero h1 { font-size: clamp(42px, 8vw, 92px); line-height:.9; margin:0 0 20px; letter-spacing:-.05em; }
.hero p { max-width: 760px; font-size: 22px; line-height:1.45; }
.grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap:18px; margin-top:28px; }
.card { background: rgba(255,255,255,.7); border:1px solid var(--line); border-radius:22px; padding:24px; box-shadow: 0 18px 40px rgba(39,35,18,.08); }
.card h2, .card h3 { margin-top:0; }
.badge { display:inline-block; padding:6px 10px; border:1px solid var(--line); border-radius:999px; background:#fff8df; color:var(--deep); font-size:14px; }
.cmd { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background:#efe3c8; padding:2px 6px; border-radius:6px; }
nav { display:flex; gap:14px; flex-wrap:wrap; margin-top:24px; }
nav a { color:#fff8df; text-decoration:none; border:1px solid rgba(255,255,255,.35); border-radius:999px; padding:8px 12px; }
</style></head><body><section class="hero"><div class="wrap"><span class="badge">Sidekick</span><h1>Kay + Codex Delegation</h1><p>Claude Code and Codex hosts delegate implementation while the host verifies every result.</p></div></section><main><section class="grid"><article class="card"><h2>Kay</h2><p>/sidekick:kay-delegate</p></article><article class="card"><h2>Codex</h2><p>/sidekick:codex-delegate</p></article></section></main></body></html>
